<div class="login-container">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="field">
      <input type="email" id="email" formControlName="email" placeholder="Email" autocomplete="email" />
    </div>

    <div class="field password-field">
      <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
        placeholder="Password" autocomplete="current-password" />
      <button type="button" class="eye-btn" (click)="togglePasswordVisibility()" tabindex="-1">
        @if (showPassword) {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        }
      </button>
    </div>

    <button type="submit" [disabled]="!loginForm.valid">Sign in</button>

    <p class="switch">Don't have an account? <a routerLink="/register">Register</a></p>
  </form>
</div>
